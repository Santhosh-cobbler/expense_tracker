<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .expense-card { 
            background: #1e293b; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between;
            border-right: 4px solid #f43f5e;
        }
        .category-tag { background: #334155; font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; color: #94a3b8; }
        .item-title { display: block; font-weight: bold; margin-top: 5px; }
        .amount-red { color: #fb7185; font-weight: bold; font-family: monospace; font-size: 1.1rem; align-self: center; }
        .btn-back { color: #94a3b8; text-decoration: none; border: 1px solid #334155; padding: 5px 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0">Income Logs</h2>
            <a href="{{url_for('debit')}}" class="btn-back">← Back</a>
        </div>
        <div class="expense-card">
            {% for i in data %}
            <div>
                <span class="category-tag">{{ i['category'] }}</span>
                <span class="item-title">{{ i['item'] }}</span>
                <span style="font-size: 0.75rem; color: #64748b;">{{ i['date'] }}</span>
            </div>
            <div class="amount-red">-{{ i['amount'] }}</div>
        </div>
        {% else %}
        <div style="text-align: center; padding: 20px; color: #888;">
            No income logs found.
        </div>
        {% endfor %}
    </div>
        </div>

</body>
</html>
