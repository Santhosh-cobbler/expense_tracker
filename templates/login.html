<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Expense.io</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #0f172a;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        .header-brand { text-align: center; margin-bottom: 30px; }
        .header-brand h1 { margin: 0; font-weight: 800; font-size: 1.8rem; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 8px; }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent-green); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-green);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim); }
        .footer-link a { color: var(--accent-green); text-decoration: none; font-weight: 600; }
        
        /* Flash message style */
        .alert {
            padding: 10px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid #ef4444;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="header-brand">
            <h1 style="color: var(--accent-green);">Expense.io</h1>
            <p style="color: var(--text-dim); margin-top: 5px;">Welcome back</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
        </div>
    </div>
</body>
</html>
