<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }
        .balance-chip {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        .container { width: 90%; max-width: 500px; padding: 20px; }
        
        /* Summary Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 8px; }
        
        /* Action Buttons */
        .nav-menu { display: grid; gap: 12px; }
        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 18px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }
        .nav-item:hover { border-color: #64748b; transform: scale(1.02); background: #263349; }
        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .bg-green { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .bg-red { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .bg-blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    </style>
</head>
<body>
    <div class="header">
        <span class="balance-chip">Active Session: {{user_name}}</span>
        <h1 style="margin:0; font-weight: 800;">Expense.io</h1>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">10-Day Income</div>
                <div class="stat-value" style="color: var(--accent-green);">+ {{ credit_past }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">10-Day Spent</div>
                <div class="stat-value" style="color: var(--accent-red);">- {{ debit_past }}</div>
            </div>
        </div>

        <div class="nav-menu">
            <a href="{{url_for('credit')}}" class="nav-item">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="icon-box bg-green">↓</div>
                    <span>Add Income</span>
                </div>
                <span style="color: var(--text-dim)">+</span>
            </a>
            <a href="{{url_for('debit')}}" class="nav-item">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="icon-box bg-red">↑</div>
                    <span>Add Expense</span>
                </div>
                <span style="color: var(--text-dim)">+</span>
            </a>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
